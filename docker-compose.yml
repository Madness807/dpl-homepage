services:
  homepage:
    image: ghcr.io/gethomepage/homepage:v0.10.9
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - ./config:/app/config:rw
    env_file:
      - .env
    environment:
      HOMEPAGE_ALLOWED_HOSTS: "${HOMEPAGE_ALLOWED_HOSTS:-localhost}"
      NODE_OPTIONS: "${NODE_OPTIONS:---dns-result-order=ipv4first}"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
