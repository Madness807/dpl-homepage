---
# Liste des services affichés sur le portail DPL.
# Doc : https://gethomepage.dev/configs/services/
#
# Règle : un service = une tuile actionnable ou un repère d'inventaire utile.
#
# Quand un service passe en actif, on remplace son href par sa vraie URL.

- Inventaire VPS:
    - Bastion:
        icon: mdi-server-network
        href: ssh://bastion.dpl.lan:2222
        description: |
          DNS  bastion.dpl.lan / bastion-01.dpl.lan
          IP   10.10.0.1
          SSH  2222 (public ou VPN)
    - Monitoring:
        icon: mdi-server-network
        href: ssh://monitoring.dpl.lan:2222
        description: |
          DNS  monitoring.dpl.lan / monitoring-01.dpl.lan
          IP   10.10.0.2
          SSH  2222 (VPN-only)
    - Host:
        icon: mdi-server-network
        href: ssh://host.dpl.lan
        description: |
          DNS  host.dpl.lan / host-01.dpl.lan
          IP   10.10.0.3
          SSH  à confirmer

- VPS:
    - OpenProject:
        icon: openproject.png
        href: http://openproject.dpl.lan
        description: Gestion de projets et tickets
        siteMonitor: http://openproject.dpl.lan
    - Dokploy:
        icon: dokploy.png
        href: http://dokploy.dpl.lan:3000
        description: Déploiement & gestion d'applications
        siteMonitor: http://dokploy.dpl.lan:3000
    - Bot Discord (DPL):
        icon: discord.png
        href: https://discord.com/developers/home
        description: Passerelle OpenProject ↔ Discord
    - Apps clients:
        icon: mdi-web
        href: http://localhost:3004
        description: Demo — hébergement d'applications clients
        siteMonitor: http://dpl-vps04-client-demo:3004

- IA:
    - OpenWebUI:
        icon: open-webui.png
        href: http://localhost:3002
        description: Interface LLM (chat, RAG)

- VPS_Bastion:
    - Traefik Dashboard:
        icon: traefik.png
        href: http://traefik.dpl.lan:8080
        description: Reverse proxy & TLS
        siteMonitor: http://traefik.dpl.lan:8080

- Monitoring:
    - GitLab:
        icon: gitlab.png
        href: https://gitlab.dpl.lan
        description: Dépôts Git & registry Docker de la plateforme
        siteMonitor: https://gitlab.dpl.lan
    - Grafana:
        icon: grafana.png
        href: http://grafana.dpl.lan
        description: Dashboards & visualisation
        siteMonitor: http://grafana.dpl.lan
    - VictoriaMetrics:
        icon: victoriametrics.png
        href: http://localhost:8428/vmui/
        description: Métriques & stockage time-series
        siteMonitor: http://victoriametrics:8428/health
    - Uptime Kuma:
        icon: uptime-kuma.png
        href: http://uptime.dpl.lan
        description: Monitoring uptime & status pages
        siteMonitor: http://uptime.dpl.lan
    - Alertmanager:
        icon: alertmanager.png
        href: http://localhost:9093
        description: Alertes en cours & silences
        siteMonitor: http://alertmanager:9093
