---
# Configuration générale de la page d'accueil DPL.
# Doc : https://gethomepage.dev/configs/settings/

language: fr
title: DPL - Portail
description: Portail interne de la plateforme DPL
theme: dark
color: zinc

# Cible par défaut : ouvrir les liens dans un nouvel onglet
target: _blank

# Style visuel
headerStyle: boxed
cardBlur: md
hideVersion: true
disableUpdateCheck: true
disableCollapse: true
fullWidth: true
useEqualHeights: true
statusStyle: dot

# Ordre des catégories — du plus quotidien au plus infra.
# Les services pas encore actifs renvoient vers la page WIP (cf. services.yaml).
layout:
  Inventaire VPS:
    style: row
    columns: 3
  VPS:
    style: row
    columns: 4
  VPS_Bastion:
    style: row
    columns: 2
  Monitoring:
    style: row
    columns: 4
  IA:
    style: row
    columns: 2
