---
# Catégorie "Composants internes" — briques sans UI web qui composent
# l'architecture mais qu'on n'ouvre pas dans le navigateur.
# Listés ici à titre documentaire pour refléter le schéma d'archi complet.
# Format Bookmarks (compact) — doc : https://gethomepage.dev/configs/bookmarks/
#
# Inventaire des hôtes VPS. Ces entrées sont documentaires : elles pointent
# vers SSH, pas vers une interface web.

- Inventaire VPS:
    - Bastion:
        - abbr: BA
          href: ssh://bastion.dpl.lan:2222
          description: |
            DNS  bastion.dpl.lan / bastion-01.dpl.lan
            IP   10.10.0.1
            SSH  2222 (public ou VPN)
    - Monitoring:
        - abbr: MO
          href: ssh://monitoring.dpl.lan:2222
          description: |
            DNS  monitoring.dpl.lan / monitoring-01.dpl.lan
            IP   10.10.0.2
            SSH  2222 (VPN-only)
    - Host:
        - abbr: HO
          href: ssh://host.dpl.lan
          description: |
            DNS  host.dpl.lan / host-01.dpl.lan
            IP   10.10.0.3
            SSH  à confirmer
